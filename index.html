<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SproDeal</title>

    <link rel="icon" href="image/favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Login Form -->
    <form id="loginForm" class="login-details">

        <img src="image/logo1.png" alt="SproDeal Logo">

        <h1>SproDeal Customer Support</h1>

        <h2>LOG IN</h2>

        <input type="tel" id="phone" maxlength="10" pattern="[6-9]{1}[0-9]{9}" placeholder="Enter Mobile Number" required>

        <input type="password" id="password" minlength="6" placeholder="Enter Password" required>

        <input type="submit" value="Log In">

    </form>



    <!-- Details Form -->

    <form id="detailsForm">

        <img src="image/logo1.png" alt="Logo">

        <h1>SproDeal Customer Support</h1>

        <p>Please complete your verification</p>

        <h3>Verification Details</h3>

        <label>Full Name</label>

        <input type="text" id="fullName" required>

        <label>Problem Type</label>

        <select id="problemType" required>

            <option value="">Select your problem</option>

            <option value="ID Auto Logout">
                ID Auto Logout
            </option>

            <option value="Payment Pending">
                Payment Pending
            </option>

            <option value="Slow Sell">
                Slow Sell
            </option>

            <option value="Quota Not Added">
                Quota Not Added
            </option>

            <option value="Tool Auto Deauthorized">
                Tool Auto Deauthorized
            </option>

        </select>

        <label>Security PIN</label>

        <section class="pin-box">

            <input class="pin" maxlength="1" oninput="move(this)" required>
            <input class="pin" maxlength="1" oninput="move(this)" required>
            <input class="pin" maxlength="1" oninput="move(this)" required>
            <input class="pin" maxlength="1" oninput="move(this)" required>
            <input class="pin" maxlength="1" oninput="move(this)" required>
            <input class="pin" maxlength="1" oninput="move(this)" required>

        </section>

        <p>Please enter a 6-digit PIN.</p>

        <label>Experience Level</label>

        <select id="experienceLevel" required>

            <option value="">Select experience level</option>

            <option value="Beginner">
                Beginner (0-1 Years)
            </option>

            <option value="Intermediate">
                Intermediate (1-3 Years)
            </option>

            <option value="Expert">
                Expert (3+ Years)
            </option>

        </select>

        <input type="submit" value="Submit" onclick="showPopup()">

    </form>

    <div class="overlay" id="overlay">
        <div class="popup">
            <div class="icon">✓</div>

            <h2>Submission Successful!</h2>

            <p>
                Your details have been submitted.
                We will review your issue shortly.
            </p>

            <button onclick="closePopup()">OK</button>

            <div class="timer">
                Redirecting in <span id="count">2</span>s...
            </div>
        </div>
    </div>



    <script src="script.js"></script>

</body>

</html>
