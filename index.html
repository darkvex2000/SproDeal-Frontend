<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SproDeal</title>
    <link href="image/favicon.ico" rel='icon' type='image/x-icon'>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form id="loginForm" class="login-details">
        <img src="image/logo1.png" alt="SproDeal logo">
        <h1>SproDeal Customer Support</h1>
        <h2>LOG IN</h2>
    
        <input type="tel" id="phone" required placeholder="Enter Mobile Number" maxlength="10" pattern="[0-9]{10}">
    
        <input type="password" id="password" required placeholder="Enter Password">
    
        <input type="submit" value="Log In">
    </form>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const phone = document.getElementById("phone").value;
            const password = document.getElementById("password").value;

            const res = await fetch("http://localhost:5500/submit", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    phone,
                    password
                })
            });

            const data = await res.json();
            alert(data.message);
        });
    </script>

</body>

</html>
